<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sathi — Your 2AM AI Friend</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0a;
    color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    padding: 24px;
  }

  .logo {
    font-size: 42px;
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #1efdab);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -1px;
  }

  .tagline {
    font-size: 15px;
    color: #6b7280;
    text-align: center;
    margin-top: -20px;
  }

  .modes {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .mode-btn {
    padding: 8px 18px;
    border-radius: 999px;
    border: 1.5px solid #374151;
    background: transparent;
    color: #9ca3af;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mode-btn:hover { border-color: #6b7280; color: #fff; }

  .mode-btn.active {
    background: #1e1b4b;
    border-color: #a78bfa;
    color: #a78bfa;
  }

  .mode-btn.active.slow { background: #1a2e1a; border-color: #34d399; color: #34d399; }
  .mode-btn.active.quiz { background: #1a1a2e; border-color: #60a5fa; color: #60a5fa; }
  .mode-btn.active.debate { background: #2e1a1a; border-color: #f87171; color: #f87171; }
  .mode-btn.active.classroom { background: #2e2a1a; border-color: #fbbf24; color: #fbbf24; }

  .orb-container {
    position: relative;
    width: 180px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .orb {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a78bfa, #60a5fa);
    cursor: pointer;
    transition: transform 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    box-shadow: 0 0 40px rgba(167, 139, 250, 0.3);
  }

  .orb:hover { transform: scale(1.05); }

  .orb.listening {
    animation: pulse 1.5s ease-in-out infinite;
    background: linear-gradient(135deg, #f87171, #a78bfa);
    box-shadow: 0 0 60px rgba(248, 113, 113, 0.4);
  }

  .orb.speaking {
    animation: speak 0.8s ease-in-out infinite alternate;
    background: linear-gradient(135deg, #34d399, #60a5fa);
    box-shadow: 0 0 60px rgba(52, 211, 153, 0.4);
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  @keyframes speak {
    from { transform: scale(1); }
    to { transform: scale(1.06); }
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1.5px solid rgba(167, 139, 250, 0.2);
    animation: ringPulse 2s ease-out infinite;
  }

  .ring:nth-child(1) { width: 140px; height: 140px; animation-delay: 0s; }
  .ring:nth-child(2) { width: 165px; height: 165px; animation-delay: 0.5s; }

  @keyframes ringPulse {
    0% { opacity: 0.5; transform: scale(0.95); }
    100% { opacity: 0; transform: scale(1.1); }
  }

  .status {
    font-size: 14px;
    color: #6b7280;
    text-align: center;
    min-height: 20px;
  }

  .transcript {
    width: 100%;
    max-width: 480px;
    max-height: 160px;
    overflow-y: auto;
    background: #111827;
    border-radius: 16px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .message {
    font-size: 13px;
    line-height: 1.5;
    padding: 8px 12px;
    border-radius: 10px;
  }

  .message.sathi {
    background: #1e1b4b;
    color: #c4b5fd;
    align-self: flex-start;
    max-width: 85%;
  }

  .message.user {
    background: #1f2937;
    color: #9ca3af;
    align-self: flex-end;
    max-width: 85%;
  }

  .hint {
    font-size: 12px;
    color: #374151;
    text-align: center;
  }
</style>
</head>
<body>

<div class="logo">sathi ✦</div>
<p class="tagline">your 2am AI best friend — always here, never judging</p>

<div class="modes">
  <button class="mode-btn active" data-mode="default" onclick="setMode('default', this)">✨ vibe</button>
  <button class="mode-btn slow" data-mode="slow" onclick="setMode('slow', this)">🐢 slow mode</button>
  <button class="mode-btn quiz" data-mode="quiz" onclick="setMode('quiz', this)">🧠 quiz me</button>
  <button class="mode-btn debate" data-mode="debate" onclick="setMode('debate', this)">🥊 debate</button>
  <button class="mode-btn classroom" data-mode="classroom" onclick="setMode('classroom', this)">🏫 classroom</button>
</div>

<div class="orb-container">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="orb" id="orb" onclick="toggleListening()" style="position:relative;z-index:10;">🎙️</div>
</div>

<div class="status" id="status">tap to start talking to sathi</div>

<div class="transcript" id="transcript">
  <div class="message sathi">hey! i'm sathi 👋 tap the orb and let's talk. i'm here for whatever — homework, stress, just vibing 💜</div>
</div>

<p class="hint">sathi speaks your language • emotionally aware • always available</p>

<script>
let ws = null;
let mediaRecorder = null;
let audioContext = null;
let currentMode = 'default';
let isListening = false;
let audioQueue = [];
let isPlaying = false;

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (isListening) {
    stopListening();
    setTimeout(() => startListening(), 300);
  }
  addMessage('sathi', getModeMessage(mode));
}

function getModeMessage(mode) {
  const msgs = {
    default: "back to vibe mode 💜 what's good?",
    slow: "slow mode on 🐢 i'll break everything down super easy, no rush",
    quiz: "quiz mode activated 🧠 i won't give you answers — i'll help you find them yourself",
    debate: "debate mode 🥊 say something and i'll argue the other side. let's go",
    classroom: "classroom mode 🏫 let's actually learn something. what's the topic?"
  };
  return msgs[mode];
}

async function toggleListening() {
  if (isListening) {
    stopListening();
  } else {
    await startListening();
  }
}

async function startListening() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioContext = new AudioContext({ sampleRate: 16000 });

    ws = new WebSocket(`wss://sathi-production.up.railway.app/ws/${currentMode}`);
    ws.binaryType = 'arraybuffer';

    ws.onopen = () => {
      setStatus('listening... 🎙️');
      setOrb('listening');
    };

    ws.onmessage = async (event) => {
      if (event.data instanceof ArrayBuffer) {
        audioQueue.push(event.data);
        if (!isPlaying) playNextAudio();
      } else {
        const msg = JSON.parse(event.data);
        if (msg.text) addMessage('sathi', msg.text);
        if (msg.error) setStatus('error: ' + msg.error);
      }
    };

    ws.onclose = () => {
      setStatus('tap to start talking to sathi');
      setOrb('idle');
      isListening = false;
    };

    const source = audioContext.createMediaStreamSource(stream);
    const processor = audioContext.createScriptProcessor(4096, 1, 1);

    processor.onaudioprocess = (e) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        const float32 = e.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          int16[i] = Math.max(-32768, Math.min(32767, float32[i] * 32768));
        }
        ws.send(int16.buffer);
      }
    };

    source.connect(processor);
    processor.connect(audioContext.destination);
    isListening = true;

  } catch (err) {
    setStatus('mic access needed 🎙️');
    console.error(err);
  }
}

function stopListening() {
  if (ws) ws.close();
  if (audioContext) audioContext.close();
  isListening = false;
  setOrb('idle');
  setStatus('tap to start talking to sathi');
}

async function playNextAudio() {
  if (audioQueue.length === 0) {
    isPlaying = false;
    setOrb(isListening ? 'listening' : 'idle');
    return;
  }
  isPlaying = true;
  setOrb('speaking');
  const buffer = audioQueue.shift();
  const ctx = new AudioContext({ sampleRate: 24000 });
  const int16 = new Int16Array(buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;
  const audioBuffer = ctx.createBuffer(1, float32.length, 24000);
  audioBuffer.getChannelData(0).set(float32);
  const source = ctx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(ctx.destination);
  source.onended = () => playNextAudio();
  source.start();
}

function setOrb(state) {
  const orb = document.getElementById('orb');
  orb.className = 'orb';
  if (state === 'listening') { orb.classList.add('listening'); orb.textContent = '🎙️'; }
  else if (state === 'speaking') { orb.classList.add('speaking'); orb.textContent = '💬'; }
  else { orb.textContent = '🎙️'; }
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  const t = document.getElementById('transcript');
  t.appendChild(div);
  t.scrollTop = t.scrollHeight;
}
</script>
</body>
</html>
